name: Enterprise release gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: enterprise-release-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  release-contracts:
    name: Release contracts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RELEASE_GATE_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
    steps:
      - name: Check out complete source history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Report toolchain and source
        shell: bash
        run: |
          set -euo pipefail
          printf 'Node: '
          node --version
          printf 'Bun: '
          bun --version
          printf 'Commit: '
          git rev-parse HEAD
          test -s bun.lock
          git ls-files --error-unmatch bun.lock

      - name: Install exactly the locked dependency graph
        run: bun install --frozen-lockfile

      - name: Prove the frozen install did not rewrite dependency inputs
        run: git diff --exit-code -- bun.lock package.json

      - name: Run blocking release contracts
        run: bun run gate:pr
